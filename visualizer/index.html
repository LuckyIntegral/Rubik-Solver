<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rubik’s Cube Visualizer</title>
    <style>
      :root{
        --bg0:#0b0d12;
        --bg1:#111827;
        --panel:#0f172a;
        --border:rgba(255,255,255,.10);
        --text:#e5e7eb;
        --muted:#9ca3af;
        --accent:#60a5fa;
        --good:#34d399;
        --bad:#fb7185;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }
      *{box-sizing:border-box}
      html,body{height:100%}
      body{
        margin:0;
        background: radial-gradient(1200px 800px at 25% 10%, #18203a 0%, var(--bg0) 55%, #07080b 100%);
        color:var(--text);
        font: 14px/1.35 system-ui, -apple-system, Segoe UI, Ubuntu, Cantarell, Noto Sans, Arial, sans-serif;
      }
      .wrap{
        display:grid;
        grid-template-columns: 360px 1fr;
        gap: 16px;
        padding: 16px;
        height:100%;
        min-height: 520px;
      }
      .panel{
        border:1px solid var(--border);
        background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
        border-radius: 14px;
        overflow:hidden;
        box-shadow: 0 10px 40px rgba(0,0,0,.35);
      }
      .panel .hdr{
        padding: 14px 14px 10px;
        border-bottom:1px solid var(--border);
        background: rgba(0,0,0,.12);
      }
      .panel .hdr h1{
        font-size: 14px;
        margin:0;
        letter-spacing:.2px;
        font-weight: 650;
      }
      .panel .hdr p{
        margin:6px 0 0;
        color:var(--muted);
        font-size:12px;
      }
      .panel .bd{padding:14px}
      label{display:block; font-size:12px; color:var(--muted); margin: 12px 0 6px}
      textarea, input[type="text"], select{
        width:100%;
        color:var(--text);
        background: rgba(0,0,0,.22);
        border:1px solid var(--border);
        border-radius: 10px;
        padding: 10px 10px;
        outline:none;
      }
      textarea{min-height:72px; resize:vertical; font-family: var(--mono); font-size: 12px; line-height:1.35}
      .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
      .row > *{flex:1}
      .btnrow{display:flex; gap:10px; flex-wrap:wrap; margin-top:12px}
      button{
        appearance:none;
        border:1px solid var(--border);
        background: rgba(255,255,255,.06);
        color:var(--text);
        padding: 9px 10px;
        border-radius: 10px;
        cursor:pointer;
        font-weight: 600;
        letter-spacing:.1px;
      }
      button:hover{border-color: rgba(255,255,255,.18); background: rgba(255,255,255,.08)}
      button.primary{border-color: rgba(96,165,250,.55); background: rgba(96,165,250,.16)}
      button.primary:hover{background: rgba(96,165,250,.22)}
      button.good{border-color: rgba(52,211,153,.55); background: rgba(52,211,153,.13)}
      button.bad{border-color: rgba(251,113,133,.55); background: rgba(251,113,133,.13)}
      button:disabled{opacity:.45; cursor:not-allowed}
      .hint{
        margin-top:10px;
        color: var(--muted);
        font-size: 12px;
      }
      .err{
        margin-top:10px;
        color: var(--bad);
        font-size: 12px;
        white-space: pre-wrap;
        font-family: var(--mono);
      }
      .kv{
        display:flex;
        justify-content:space-between;
        gap:10px;
        font-size:12px;
        color:var(--muted);
        margin-top: 10px;
        font-family: var(--mono);
      }
      .slider{
        display:flex;
        align-items:center;
        gap:10px;
      }
      input[type="range"]{width:100%}
      .stage{
        position:relative;
        border:1px solid var(--border);
        border-radius: 14px;
        overflow:hidden;
        background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(0,0,0,.08));
      }
      #view{
        width:100%;
        height:100%;
        display:block;
      }
      .hud{
        position:absolute;
        left:14px;
        right:14px;
        bottom:12px;
        display:flex;
        justify-content:space-between;
        gap:12px;
        pointer-events:none;
      }
      .pill{
        pointer-events:none;
        padding: 8px 10px;
        border-radius: 999px;
        border:1px solid var(--border);
        background: rgba(0,0,0,.35);
        color: var(--text);
        font-family: var(--mono);
        font-size: 12px;
      }
      .pill b{color: white}
      @media (max-width: 920px){
        .wrap{grid-template-columns: 1fr; grid-template-rows: auto 1fr}
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <div class="hdr">
          <h1>Rubik’s Cube Visualizer</h1>
          <p>Paste <b>scramble</b> + <b>solve</b> algorithms. Drag to rotate the whole cube. Step moves forward/back with animation.</p>
        </div>
        <div class="bd">
          <label for="scramble">Scramble algorithm</label>
          <textarea id="scramble" spellcheck="false">R U R' U'</textarea>

          <label for="solve">Solve algorithm</label>
          <textarea id="solve" spellcheck="false">U R U' R'</textarea>

          <div class="btnrow">
            <button id="btnLoad" class="primary">Load sequence</button>
            <button id="btnResetCube" class="bad" title="Reset to solved cube">Reset cube</button>
            <button id="btnResetView" title="Reset camera">Reset view</button>
          </div>

          <label>Playback</label>
          <div class="btnrow">
            <button id="btnBack" class="" title="Step back (inverse last move)">◀ Back</button>
            <button id="btnStep" class="" title="Step forward">Step ▶</button>
            <button id="btnPlay" class="good" title="Play from current position">Play</button>
            <button id="btnPause" title="Pause">Pause</button>
          </div>

          <label>Move speed</label>
          <div class="slider">
            <input id="speed" type="range" min="80" max="900" step="10" value="240" />
            <div style="min-width:88px; text-align:right; font-family:var(--mono)" id="speedLabel">240 ms</div>
          </div>

          <label>Manual move</label>
          <div class="row">
            <select id="manualMove">
              <option>R</option><option>R'</option><option>R2</option>
              <option>L</option><option>L'</option><option>L2</option>
              <option>U</option><option>U'</option><option>U2</option>
              <option>D</option><option>D'</option><option>D2</option>
              <option>F</option><option>F'</option><option>F2</option>
              <option>B</option><option>B'</option><option>B2</option>
            </select>
            <button id="btnManual">Apply</button>
          </div>

          <div class="hint">
            Keys: <b>Space</b> play/pause, <b>←</b>/<b>→</b> step, <b>Backspace</b> undo.
            Moves supported: <span style="font-family:var(--mono)">R L U D F B</span> with <span style="font-family:var(--mono)">'</span> and <span style="font-family:var(--mono)">2</span>.
          </div>
          <div class="kv">
            <div id="status">Ready</div>
            <div id="pos">0 / 0</div>
          </div>
          <div id="error" class="err"></div>
        </div>
      </div>

      <div class="stage">
        <canvas id="view"></canvas>
        <div class="hud">
          <div class="pill"><b>Drag</b> rotate • <b>Scroll</b> zoom</div>
          <div class="pill" id="pillMove">Move: <b>—</b></div>
        </div>
      </div>
    </div>

    <script type="module" src="./index.js"></script>
  </body>
</html>
